projects:
  title: "Projects"
  items:
    - name: "DR Tulu"
      description: "A reinforcement learning framework for deep research that uses evolving rubrics to improve planning, evidence grounding, and long-form report quality."
      url: "https://github.com/rlresearch/dr-tulu"
    - name: "Seed1.5-Embedding"
      description: "A strong embedding model focused on retrieval and reasoning quality, designed for robust performance on benchmarks such as MTEB and BRIGHT."
      url: "https://seed1-5-embedding.github.io"
    - name: "InternLM"
      description: "An open large language model family with training, alignment, and evaluation components for general-purpose NLP and agent-style use cases."
      url: "https://github.com/InternLM/InternLM"
    - name: "OpenCompass"
      description: "An extensible LLM evaluation platform that supports diverse benchmarks across code, agents, long context, math, and instruction following."
      url: "https://github.com/open-compass/opencompass"

